<!DOCTYPE html>
<html>
<head>
    <title>Audio to Bytebeat Converter</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #111; color: #0f0; padding: 20px; text-align: center; }
        .container { border: 2px solid #0f0; padding: 20px; display: inline-block; background: #000; border-radius: 10px; }
        input, button, select { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 10px; }
        button:hover { background: #0f0; color: #000; cursor: pointer; }
        #status { color: #888; margin: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AUDIO TO BYTEBEAT</h1>
        <input type="file" id="audioInput" accept="audio/*"><br>
        <label>Sample Rate:</label>
        <input type="number" id="srInput" value="8000" style="width: 80px;"><br>
        <button onclick="process()">CONVERT TO CODE</button>
        <div id="status">Ready.</div>
    </div>

    <script>
        async function process() {
            const file = document.getElementById('audioInput').files[0];
            if (!file) return alert("Select a file!");
            const sr = parseInt(document.getElementById('srInput').value);
            const status = document.getElementById('status');
            
            status.innerText = "Decoding...";
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const buffer = await ctx.decodeAudioData(await file.arrayBuffer());
            const data = buffer.getChannelData(0); // Mono

            status.innerText = "Compressing (RLE)...";
            let final = "";
            let i = 0;
            
            while (i < data.length) {
                let v = Math.floor(((data[i] + 1) / 2) * 255);
                let count = 0;
                while (i < data.length && Math.floor(((data[i] + 1) / 2) * 255) === v) {
                    count++;
                    i++;
                }
                
                let char = v === 92 ? "\\\\" : (v === 96 ? "\\`" : `\\x${v.toString(16).padStart(2, '0')}`);
                let rStr = `\${r(\`${char}\`,${count})}`;
                final += (count > 5) ? rStr : char.repeat(count);
            }

            const output = `z=0,r=(b,c)=>b.repeat(c),a=\`${final}\`;return ((t,sr)=>{z+=((a.charCodeAt((t*${sr})%a.length)/(255/2)-1)-z)/Math.max(sr/${sr},1);return z})`;
            
            const blob = new Blob([output], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "bytebeat_code.txt";
            a.click();
            status.innerText = "Done!";
        }
    </script>
</body>
</html>
