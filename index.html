<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio to Bytebeat Converter</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #0f0; padding: 20px; display: flex; justify-content: center; }
        .box { border: 2px solid #0f0; padding: 20px; border-radius: 10px; width: 100%; max-width: 500px; background: #000; }
        h1 { font-size: 1.5rem; text-align: center; border-bottom: 1px solid #0f0; padding-bottom: 10px; }
        input, select, button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 10px 0; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #0f0; color: #000; }
        #status { margin: 10px 0; font-size: 0.9rem; color: #888; }
        #output { width: 100%; height: 150px; background: #111; color: #0f0; border: 1px solid #333; margin-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="box">
        <h1>AUDIO >> BYTEBEAT</h1>
        <label>Select Audio:</label>
        <input type="file" id="audioInput" accept="audio/*">
        
        <label>Sample Rate (Hz):</label>
        <input type="number" id="srInput" value="8000">
        
        <label>Looping:</label>
        <select id="loopInput">
            <option value="y">Enabled</option>
            <option value="n">Disabled</option>
        </select>

        <button onclick="processAudio()">Run Conversion</button>
        
        <div id="status">Ready.</div>
        <textarea id="output" readonly placeholder="Output code will appear here..."></textarea>
    </div>

    <script>
        async function processAudio() {
            const file = document.getElementById('audioInput').files[0];
            if (!file) return alert("Select a file first!");

            const sr = parseInt(document.getElementById('srInput').value);
            const loop = document.getElementById('loopInput').value === 'y';
            const status = document.getElementById('status');
            
            status.innerText = "Processing audio...";
            
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const arrayBuffer = await file.arrayBuffer();
            const decodedData = await audioCtx.decodeAudioData(arrayBuffer);
            
            // Resample to the target sample rate
            const offlineCtx = new OfflineAudioContext(1, decodedData.duration * sr, sr);
            const source = offlineCtx.createBufferSource();
            source.buffer = decodedData;
            source.connect(offlineCtx.destination);
            source.start();
            
            const renderedBuffer = await offlineCtx.startRendering();
            const vals = renderedBuffer.getChannelData(0);
            
            status.innerText = "Encoding string...";
            let final = "";
            for (let i = 0; i < vals.length; i++) {
                let v = Math.floor(((vals[i] + 1) / 2) * 255);
                let char = String.fromCharCode(v);
                if (char === "`") char = "\\`";
                if (char === "\\") char = "\\\\";
                final += char;
            }

            const code = `z=0,a=\`${final}\`;return ((t,sr)=>{z+=((a.charCodeAt((t*${sr})%a.length)/(255/2)-1)-z)/Math.max(sr/${sr},1);return z})`;
            
            document.getElementById('output').value = code;
            status.innerText = "Done! Downloading...";
            
            const blob = new Blob([code], {type: 'text/plain'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "bytebeat_output.txt";
            a.click();
        }
    </script>
</body>
</html>
